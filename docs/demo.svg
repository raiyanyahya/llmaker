<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 410" width="820" height="410" role="img" aria-label="llmaker terminal demo">
  <style>
    text { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 15px; }
    .p   { fill: #3fb950; }  /* prompt   */
    .c   { fill: #e6edf3; }  /* command  */
    .ok  { fill: #3fb950; }  /* success  */
    .dim { fill: #7d8590; }  /* muted    */
    .acc { fill: #58a6ff; }  /* endpoint */
    .str { fill: #a5d6ff; }  /* strings  */
  </style>

  <!-- window -->
  <rect x="0.5" y="0.5" width="819" height="409" rx="10" fill="#0d1117" stroke="#30363d"/>
  <!-- title bar -->
  <path d="M0 10 a10 10 0 0 1 10 -10 h800 a10 10 0 0 1 10 10 v30 h-820 z" fill="#161b22"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text x="410" y="25" text-anchor="middle" class="dim">llmaker — self-host the modern LLM stack</text>

  <!-- body -->
  <text x="24" y="80"  xml:space="preserve"><tspan class="p">$ </tspan><tspan class="c">llmaker stack init rag</tspan></text>
  <text x="24" y="106" xml:space="preserve"><tspan class="ok">✓ </tspan><tspan class="dim">wrote stack.yaml (rag stack)</tspan></text>

  <text x="24" y="158" xml:space="preserve"><tspan class="p">$ </tspan><tspan class="c">llmaker apply -f stack.yaml</tspan></text>
  <text x="24" y="184" xml:space="preserve"><tspan class="dim">  ▸ </tspan><tspan class="c">qdrant      </tspan><tspan class="dim">→ </tspan><tspan class="acc">qdrant:6333     </tspan><tspan class="ok">✓ </tspan><tspan class="dim">ready</tspan></text>
  <text x="24" y="210" xml:space="preserve"><tspan class="dim">  ▸ </tspan><tspan class="c">embeddings  </tspan><tspan class="dim">→ </tspan><tspan class="acc">embeddings:80   </tspan><tspan class="ok">✓ </tspan><tspan class="dim">ready</tspan></text>
  <text x="24" y="236" xml:space="preserve"><tspan class="dim">  ▸ </tspan><tspan class="c">langfuse    </tspan><tspan class="dim">→ </tspan><tspan class="acc">langfuse:3000   </tspan><tspan class="ok">✓ </tspan><tspan class="dim">ready</tspan></text>
  <text x="24" y="262" xml:space="preserve"><tspan class="dim">  ▸ </tspan><tspan class="c">agent       </tspan><tspan class="dim">→ </tspan><tspan class="acc">agent:8800      </tspan><tspan class="ok">✓ </tspan><tspan class="dim">ready</tspan></text>

  <text x="24" y="314" xml:space="preserve"><tspan class="p">$ </tspan><tspan class="c">curl $AGENT/api/chat -d '{"question":"refund policy?"}'</tspan></text>
  <text x="24" y="340" xml:space="preserve"><tspan class="dim">{ </tspan><tspan class="c">"answer"</tspan><tspan class="dim">: </tspan><tspan class="str">"Refunds are accepted within 30 days…"</tspan><tspan class="dim">,</tspan></text>
  <text x="24" y="366" xml:space="preserve"><tspan class="dim">  </tspan><tspan class="c">"sources"</tspan><tspan class="dim">: </tspan><tspan class="str">["policy.pdf"]</tspan><tspan class="dim"> }</tspan></text>
</svg>
