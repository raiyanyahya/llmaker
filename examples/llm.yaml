# Example llmaker fleet file.
#   llmaker apply -f examples/llm.yaml
#   llmaker apply -f examples/llm.yaml --prune   # also remove instances not listed
#
# Ports left unset are auto-assigned. Anything omitted on an instance falls back
# to `defaults`, then to the backend's own default.
version: "1"

defaults:
  backend: ollama
  memory: 8g
  cpus: "4"
  host: 127.0.0.1

instances:
  # A general chat model.
  - name: chat
    model: llama3:8b
    memory: 8g
    env:
      KEEP_ALIVE: 15m

  # A small, fast model for embeddings / classification.
  - name: embed
    model: nomic-embed-text
    memory: 2g
    cpus: "2"

  # A larger model pinned to a fixed port, GPU-accelerated (Linux + NVIDIA).
  - name: big
    model: llama3:70b
    memory: 48g
    gpu: true
    port: 11550
